name: Daily Trigger

on:
  schedule:
    # Run at 10:00 UTC (6:00 AM ET) every day during MLB season (Mar-Oct)
    - cron: "0 10 * 3-10 *"
  workflow_dispatch:

jobs:
  trigger-deployed-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger secured endpoint
        env:
          TRIGGER_URL: ${{ vars['MLB_TRIGGER_URL'] }}
          TRIGGER_API_KEY: ${{ secrets['TRIGGER_API_KEY'] }}
        run: |
          test -n "$TRIGGER_URL"
          test -n "$TRIGGER_API_KEY"

          curl -fsS -X POST \
            -H "X-Trigger-Key: $TRIGGER_API_KEY" \
            "$TRIGGER_URL" | tee trigger_response.json
