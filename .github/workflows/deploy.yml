name: Deploy

on:
  push:
    branches: ["main"]
    paths:
      - "src/**"
      - "scripts/**"
      - "Dockerfile"
      - "pyproject.toml"
      - "infra/**"
  workflow_dispatch:

env:
  ACR_NAME: ${{ vars.AZURE_ACR_NAME }}
  IMAGE_NAME: mlbv1
  RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
  LOCATION: ${{ vars.AZURE_LOCATION }}
  NAME_PREFIX: ${{ vars.AZURE_NAME_PREFIX }}
  CONTAINER_APP_NAME: ${{ vars.AZURE_CONTAINER_APP }}
  HEALTH_URL: ${{ vars['AZURE_HEALTH_URL'] }}

jobs:
  lint-and-test:
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dashboard,dev]"
      - name: Ruff
        run: ruff check src tests scripts
      - name: Mypy
        run: mypy src
      - name: Pytest
        run: pytest --tb=short -q

  infra:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Ensure resource group exists
        run: az group create --name ${{ env.RESOURCE_GROUP }} --location ${{ env.LOCATION }} --output none 2>/dev/null || true

      - name: Deploy Bicep
        run: |
          az deployment group create \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --template-file infra/main.bicep \
            --parameters namePrefix=${{ env.NAME_PREFIX }} location=${{ env.LOCATION }}

  build-and-push:
    needs: infra
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR Login
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build & Push Docker image
        run: |
          TAG=${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
          LATEST=${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest
          docker build -t $TAG -t $LATEST .
          docker push $TAG
          docker push $LATEST

  deploy-app:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update Container App image
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Smoke test health endpoint
        run: |
          FQDN=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn \
            --output tsv || true)

          if [ -n "$FQDN" ]; then
            TARGET_URL="https://$FQDN/health"
          elif [ -n "${{ env.HEALTH_URL }}" ]; then
            TARGET_URL="${{ env.HEALTH_URL }}"
          else
            echo "No ingress FQDN and HEALTH_URL is not configured"
            exit 1
          fi

          echo "Smoke testing $TARGET_URL"
          curl -fsS "$TARGET_URL" | tee /tmp/health.json
