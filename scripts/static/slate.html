<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GBSV MLB Daily Slate</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:#f8f9fa;color:#1a2332;min-height:100vh}
a{color:#2563eb;text-decoration:none}
/* Header */
.hdr{padding:12px 20px;background:#fff;border-bottom:1px solid #dee2e6}
.hdr-title{font-size:20px;font-weight:700;color:#1a2332}
.hdr-date{font-size:13px;color:#6b7280}
.hdr-meta{font-size:12px;color:#6b7280}
/* Filters */
#filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;align-items:center;padding:10px 20px}
#filters select,#filters input{padding:6px 10px;border:1px solid #dee2e6;border-radius:6px;font-size:13px;background:#fff;color:#1a2332;cursor:pointer}
#filters input{width:100px}
.rst-btn{padding:6px 14px;border:none;border-radius:6px;background:#1a2332;color:#d4af37;font-weight:600;font-size:12px;cursor:pointer;letter-spacing:.5px}
.rst-btn:hover{background:#2d3748}
.act-btn{padding:6px 14px;border:none;border-radius:6px;font-weight:600;font-size:12px;cursor:pointer;letter-spacing:.5px;color:#fff}
.refresh-btn{background:#238636;margin-left:auto}.refresh-btn:hover{background:#2ea043}
.spinner{display:inline-block;width:12px;height:12px;border:2px solid #ffffff40;border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;margin-right:4px}
@keyframes spin{to{transform:rotate(360deg)}}
/* Table */
table#slate{width:100%;border-collapse:collapse;border:1px solid #dee2e6;margin:0 auto}
#slate th{background:#1a2332;color:#d4af37;font-weight:600;font-size:11px;letter-spacing:1px;text-transform:uppercase;padding:8px 6px;text-align:left;white-space:nowrap;cursor:pointer;user-select:none}
#slate td{padding:6px;border-bottom:1px solid #e9ecef;font-size:13px;vertical-align:middle}
#slate tbody tr:hover{background:#eef2ff!important}
.sort-arrow{margin-left:4px;font-size:10px}
/* Seg badges */
.seg-badge{padding:2px 6px;border-radius:4px;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px}
.seg-fg{background:rgba(52,168,83,.15);color:#34a853;border:1px solid rgba(52,168,83,.3)}
.seg-f5{background:rgba(66,133,244,.15);color:#4285f4;border:1px solid rgba(66,133,244,.3)}
/* Market */
.mkt{font-weight:600;color:#374151;font-size:12px}
/* Pick cell */
.pick-odds{font-size:12px;font-weight:700;color:#dc2626;background:rgba(0,0,0,.04);padding:1px 4px;border-radius:3px}
.pick-rationale{font-size:11px;color:#6b7280;font-style:italic;margin-top:2px}
/* Edge colors */
.edge-green{color:#16a34a}.edge-amber{color:#ca8a04}.edge-red{color:#dc2626}
/* Heat */
.heat-pill{padding:2px 6px;border-radius:4px;font-weight:700;font-size:13px}
.heat-4{background:#dcfce7;color:#15803d}
.heat-3{background:#fef9c3;color:#854d0e}
.heat-2{background:#fee2e2;color:#991b1b}
.heat-1{background:#f3f4f6;color:#6b7280}
/* Rec star */
.rec-star{color:#d4af37;font-size:14px;margin-right:2px}
/* Footer */
.footer{text-align:center;padding:8px;color:#9ca3af;font-size:11px}
/* Responsive */
@media(max-width:768px){
    #filters{flex-direction:column}
    #slate{font-size:11px}
    #slate th,#slate td{padding:4px 3px}
    .hdr{padding:10px 12px}
}
/* Loading */
#loading{text-align:center;padding:60px 20px;color:#6b7280;font-size:14px}
#error-msg{text-align:center;padding:20px;color:#dc2626;font-size:14px;display:none}
.container{max-width:1400px;margin:0 auto;padding:0 8px}
</style>
</head>
<body>
<div class="container">

<div class="hdr">
    <div class="hdr-title">&#9918; MLB Daily Slate</div>
    <div class="hdr-date" id="slateDate">Loading...</div>
    <div class="hdr-meta" id="slateMeta"></div>
</div>

<div id="filters">
    <select id="fMatchup" onchange="applyFilters()"><option value="">All Matchups</option></select>
    <select id="fSeg" onchange="applyFilters()">
        <option value="">All Segments</option>
        <option value="FG">FG</option>
        <option value="F5">F5</option>
    </select>
    <select id="fMkt" onchange="applyFilters()">
        <option value="">All Markets</option>
        <option value="ML">ML</option>
        <option value="Spread">Spread</option>
        <option value="Total">Total</option>
        <option value="Team Total">Team Total</option>
    </select>
    <input id="fEdge" type="number" step="0.5" min="0" placeholder="Min EV %" oninput="applyFilters()">
    <select id="fRec" onchange="applyFilters()">
        <option value="">All Picks</option>
        <option value="yes">Recommended Only</option>
    </select>
    <button class="rst-btn" onclick="resetFilters()">RESET</button>
    <button class="act-btn refresh-btn" id="refreshBtn" onclick="refreshOdds()">&#10227; Refresh Odds</button>
</div>

<div id="loading">Loading slate data...</div>
<div id="error-msg"></div>

<table id="slate" style="display:none">
<thead>
<tr>
    <th onclick="sortTable(0,'text')" data-col="0">Time CT<span class="sort-arrow">&#9650;&#9660;</span></th>
    <th onclick="sortTable(1,'text')" data-col="1">Matchup<span class="sort-arrow">&#9650;&#9660;</span></th>
    <th onclick="sortTable(2,'text')" data-col="2">Seg<span class="sort-arrow">&#9650;&#9660;</span></th>
    <th onclick="sortTable(3,'text')" data-col="3">Market<span class="sort-arrow">&#9650;&#9660;</span></th>
    <th onclick="sortTable(4,'text')" data-col="4">Pick<span class="sort-arrow">&#9650;&#9660;</span></th>
    <th onclick="sortTable(5,'text')" data-col="5">Model<span class="sort-arrow">&#9650;&#9660;</span></th>
    <th onclick="sortTable(6,'num')" data-col="6" style="text-align:center">EV%<span class="sort-arrow">&#9650;&#9660;</span></th>
    <th onclick="sortTable(7,'num')" data-col="7" style="text-align:center">Rating<span class="sort-arrow">&#9650;&#9660;</span></th>
</tr>
</thead>
<tbody id="slateBody"></tbody>
</table>

<div class="footer" id="slateFooter"></div>

</div>

<script>
var _data=[];
var _sortCol=6;
var _sortAsc=false;

function getDateParam(){
    var p=new URLSearchParams(window.location.search);
    return p.get('date')||'';
}

function formatTimeCT(raw){
    if(!raw||raw==='nan')return '\u2014';
    try{
        var d=new Date(raw);
        if(isNaN(d.getTime()))return raw;
        var ct=new Date(d.getTime()-(6*60*60*1000));
        var yr=ct.getUTCFullYear();
        var mo=String(ct.getUTCMonth()+1).padStart(2,'0');
        var day=String(ct.getUTCDate()).padStart(2,'0');
        var hr=ct.getUTCHours();
        var mn=String(ct.getUTCMinutes()).padStart(2,'0');
        var ampm=hr>=12?'PM':'AM';
        hr=hr%12||12;
        return yr+'-'+mo+'-'+day+' '+hr+':'+mn+' '+ampm+' CT';
    }catch(e){return raw;}
}

function evPct(val){
    var v=parseFloat(val);
    if(isNaN(v))return 0;
    return +(v*100).toFixed(1);
}

function heatRating(ev){
    var v=parseFloat(ev);
    if(isNaN(v))return{n:0,emoji:'',cls:'heat-1'};
    var pct=v*100;
    if(pct>=8) return{n:4,emoji:'\uD83D\uDD25\uD83D\uDD25\uD83D\uDD25\uD83D\uDD25',cls:'heat-4'};
    if(pct>=5) return{n:3,emoji:'\uD83D\uDD25\uD83D\uDD25\uD83D\uDD25',cls:'heat-3'};
    if(pct>=3) return{n:2,emoji:'\uD83D\uDD25\uD83D\uDD25',cls:'heat-2'};
    return{n:1,emoji:'\uD83D\uDD25',cls:'heat-1'};
}

function edgeColor(pct){
    if(pct>=5)return 'edge-green';
    if(pct>=3)return 'edge-amber';
    return 'edge-red';
}

function segBadge(seg){
    var cls=seg==='FG'?'seg-fg':'seg-f5';
    return '<span class="seg-badge '+cls+'">'+seg+'</span>';
}

function buildPickCell(row){
    var rec=(row.is_recommended==='True'||row.is_recommended==='true'||row.is_recommended===true);
    var star=rec?'<span class="rec-star">\u2605</span>':'';
    var odds=parseInt(row.odds_current);
    var oddsStr=odds>=0?'+'+odds:''+odds;
    var borderColor=rec?'#16a34a':'#9ca3af';

    var html='<div style="border-left:3px solid '+borderColor+';padding-left:6px;font-weight:700">'+
        star+row.pick+' <span class="pick-odds">('+oddsStr+')</span>';

    var rationale=row.rationale_bullets||'';
    if(rationale){
        var parts=rationale.split(' | ');
        var modelPart='';
        for(var i=0;i<parts.length;i++){
            if(parts[i].indexOf('Model:')>=0||parts[i].indexOf('\uD83E\uDD16')>=0){
                modelPart=parts[i].replace(/\uD83E\uDD16\s*Model:\s*/,'');
                break;
            }
        }
        if(modelPart){
            html+='<div class="pick-rationale">'+modelPart+'</div>';
        }
    }
    html+='</div>';
    return html;
}

function buildModelCell(row){
    var eh=parseFloat(row.exp_home_score)||0;
    var ea=parseFloat(row.exp_away_score)||0;
    if(eh===0&&ea===0)return '\u2014';
    return '<span style="font-weight:600">'+
        row.home_team+' '+eh.toFixed(1)+', '+
        row.away_team+' '+ea.toFixed(1)+'</span>';
}

function buildRow(row){
    var ev=evPct(row.no_vig_ev);
    var heat=heatRating(row.no_vig_ev);
    var matchup='<span style="color:#2563eb">'+row.away_team+'</span> @ '+
        '<span style="color:#16a34a;font-weight:700">'+row.home_team+'</span>';
    var rec=(row.is_recommended==='True'||row.is_recommended==='true'||row.is_recommended===true);

    var tr=document.createElement('tr');
    tr.dataset.matchup=row.game;
    tr.dataset.seg=row.segment;
    tr.dataset.mkt=row.market_type;
    tr.dataset.edge=ev.toFixed(1);
    tr.dataset.rec=rec?'yes':'no';
    tr.dataset.time=row.game_time||'';
    tr.dataset.rating=heat.n;

    tr.innerHTML=
        '<td>'+formatTimeCT(row.game_time)+'</td>'+
        '<td>'+matchup+'</td>'+
        '<td>'+segBadge(row.segment)+'</td>'+
        '<td><span class="mkt">'+row.market_type.toUpperCase()+'</span></td>'+
        '<td>'+buildPickCell(row)+'</td>'+
        '<td>'+buildModelCell(row)+'</td>'+
        '<td style="text-align:center;font-weight:700;font-size:14px" class="'+edgeColor(ev)+'">'+ev.toFixed(1)+'</td>'+
        '<td style="text-align:center"><span class="heat-pill '+heat.cls+'">'+heat.emoji+'</span></td>';

    return tr;
}

function populateFilters(picks){
    var sel=document.getElementById('fMatchup');
    // Clear old options except first
    while(sel.options.length>1)sel.remove(1);
    var matchups={};
    picks.forEach(function(p){matchups[p.game]=true;});
    Object.keys(matchups).sort().forEach(function(m){
        var o=document.createElement('option');
        o.value=m;o.textContent=m;
        sel.appendChild(o);
    });
}

function renderTable(picks){
    var tbody=document.getElementById('slateBody');
    tbody.innerHTML='';
    picks.sort(function(a,b){
        return parseFloat(b.no_vig_ev)-parseFloat(a.no_vig_ev);
    });
    picks.forEach(function(row,i){
        var tr=buildRow(row);
        tr.style.background=i%2===0?'#ffffff':'#f8f9fa';
        tbody.appendChild(tr);
    });
}

function applyFilters(){
    var m=document.getElementById('fMatchup').value;
    var s=document.getElementById('fSeg').value;
    var k=document.getElementById('fMkt').value;
    var e=parseFloat(document.getElementById('fEdge').value)||0;
    var rec=document.getElementById('fRec').value;
    var rows=document.querySelectorAll('#slate tbody tr');
    var vis=0;
    rows.forEach(function(r){
        var show=true;
        if(m&&r.dataset.matchup!==m)show=false;
        if(s&&r.dataset.seg!==s)show=false;
        if(k&&r.dataset.mkt!==k)show=false;
        if(e&&parseFloat(r.dataset.edge)<e)show=false;
        if(rec==='yes'&&r.dataset.rec!=='yes')show=false;
        r.style.display=show?'':'none';
        if(show){
            r.style.background=vis%2===0?'#ffffff':'#f8f9fa';
            vis++;
        }
    });
}

function resetFilters(){
    document.getElementById('fMatchup').value='';
    document.getElementById('fSeg').value='';
    document.getElementById('fMkt').value='';
    document.getElementById('fEdge').value='';
    document.getElementById('fRec').value='';
    applyFilters();
}

function sortTable(col,type){
    var tb=document.querySelector('#slate tbody');
    var rows=Array.from(tb.rows);
    if(_sortCol===col){_sortAsc=!_sortAsc;}
    else{_sortCol=col;_sortAsc=type==='num'?false:true;}
    rows.sort(function(a,b){
        var av=a.cells[col].textContent.trim();
        var bv=b.cells[col].textContent.trim();
        if(type==='num'){
            av=parseFloat(av)||0;
            bv=parseFloat(bv)||0;
            return _sortAsc?av-bv:bv-av;
        }
        return _sortAsc?av.localeCompare(bv):bv.localeCompare(av);
    });
    rows.forEach(function(r,i){
        tb.appendChild(r);
        r.style.background=i%2===0?'#ffffff':'#f8f9fa';
    });
    document.querySelectorAll('#slate thead th .sort-arrow').forEach(function(s,i){
        s.textContent=i===col?(_sortAsc?'\u25B2':'\u25BC'):'\u25B2\u25BC';
    });
}

function refreshOdds(){
    var btn=document.getElementById('refreshBtn');
    btn.disabled=true;
    btn.innerHTML='<span class="spinner"></span>Refreshing...';
    var dateParam=getDateParam();
    var url='/api/slate?refresh=true'+(dateParam?'&date='+dateParam:'');
    fetch(url)
        .then(function(r){return r.json();})
        .then(function(d){
            if(d.status==='ok'){
                _data=d.picks;
                renderTable(_data);
                populateFilters(_data);
                updateHeader(d);
                applyFilters();
            }
        })
        .catch(function(err){console.error('Refresh failed:',err);})
        .finally(function(){
            btn.disabled=false;
            btn.innerHTML='&#10227; Refresh Odds';
        });
}

function updateHeader(d){
    var recCount=0;
    d.picks.forEach(function(p){
        if(p.is_recommended==='True'||p.is_recommended==='true'||p.is_recommended===true)recCount++;
    });
    var games={};
    d.picks.forEach(function(p){games[p.game]=true;});
    var nGames=Object.keys(games).length;
    document.getElementById('slateDate').textContent=d.date||'';
    document.getElementById('slateMeta').textContent=
        'Model v1.0 \u00b7 Odds pulled '+(d.last_refreshed||'\u2014')+
        ' \u00b7 '+nGames+' games \u00b7 '+d.picks.length+' picks \u00b7 '+recCount+' recommended';
    document.getElementById('slateFooter').textContent=
        'GBSV MLB v1.0 \u00b7 Sorted by EV descending \u00b7 \u2605 = recommended';
}

function loadSlate(){
    var dateParam=getDateParam();
    var url='/api/slate'+(dateParam?'?date='+dateParam:'');
    fetch(url)
        .then(function(r){return r.json();})
        .then(function(d){
            document.getElementById('loading').style.display='none';
            if(d.status!=='ok'||!d.picks||d.picks.length===0){
                document.getElementById('error-msg').style.display='block';
                document.getElementById('error-msg').textContent=
                    'No picks available. '+(d.message||'Run the pipeline first or click Refresh Odds.');
                return;
            }
            _data=d.picks;
            document.getElementById('slate').style.display='table';
            renderTable(_data);
            populateFilters(_data);
            updateHeader(d);
        })
        .catch(function(err){
            document.getElementById('loading').style.display='none';
            document.getElementById('error-msg').style.display='block';
            document.getElementById('error-msg').textContent='Failed to load slate: '+err;
        });
}

loadSlate();
</script>
</body>
</html>
