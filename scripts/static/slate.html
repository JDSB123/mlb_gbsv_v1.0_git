<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GBSV MLB Slate</title>
    <link href="https://unpkg.com/tabulator-tables@6.3/dist/css/tabulator_midnight.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --border: #30363d;
            --text-primary: #f0f6fc;
            --text-secondary: #c9d1d9;
            --text-muted: #8b949e;
            --accent: #58a6ff;
            --green: #3fb950;
            --green-bg: #0f2d1a;
            --amber: #e3b341;
            --red: #f85149;
            --purple: #d2a8ff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-primary);
            color: var(--text-secondary);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Header ──────────────────────────────────────────── */
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 16px 20px;
            position: sticky; top: 0; z-index: 100;
        }
        .header h1 {
            font-size: 1.4rem; color: var(--accent);
            display: flex; align-items: center; gap: 8px;
        }
        .header .sub { font-size: 0.82rem; color: var(--text-muted); margin-top: 2px; }

        /* ── Stats Bar ───────────────────────────────────────── */
        .stats-bar {
            display: flex; gap: 10px; flex-wrap: wrap;
            padding: 12px 20px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--bg-tertiary);
        }
        .stat {
            background: var(--bg-tertiary); border-radius: 8px;
            padding: 10px 16px; flex: 1; min-width: 85px; text-align: center;
        }
        .stat .val {
            font-size: 1.35rem; font-weight: 700; color: var(--text-primary);
        }
        .stat .lbl {
            font-size: 0.65rem; text-transform: uppercase;
            color: var(--text-muted); letter-spacing: 0.5px;
        }
        .stat.green .val { color: var(--green); }

        /* ── Controls ────────────────────────────────────────── */
        .controls {
            display: flex; gap: 6px; align-items: center; flex-wrap: wrap;
            padding: 10px 20px;
        }
        .fbtn {
            background: var(--bg-tertiary); color: var(--text-secondary);
            border: 1px solid var(--border); padding: 6px 14px;
            border-radius: 6px; cursor: pointer; font-size: 0.82rem;
            transition: all 0.12s; user-select: none;
        }
        .fbtn:hover { background: var(--border); }
        .fbtn.active { background: #1f6feb; border-color: #1f6feb; color: #fff; }
        .act-btn {
            border: none; padding: 8px 16px; border-radius: 6px;
            cursor: pointer; font-size: 0.82rem; font-weight: 600;
            margin-left: auto; transition: background 0.12s; color: #fff;
        }
        .act-btn:disabled { background: var(--bg-tertiary); cursor: not-allowed; color: var(--text-muted); }
        .refresh-btn { background: #238636; }
        .refresh-btn:hover:not(:disabled) { background: #2ea043; }
        .teams-btn { background: #5b5fc7; margin-left: 6px; }
        .teams-btn:hover:not(:disabled) { background: #7b7fc7; }
        .spinner {
            display: inline-block; width: 14px; height: 14px;
            border: 2px solid #ffffff40; border-top-color: #fff;
            border-radius: 50%; animation: spin 0.6s linear infinite;
            margin-right: 6px; vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Table Container ─────────────────────────────────── */
        #table-wrap { padding: 0 20px 20px; }

        /* ── Tabulator Overrides ──────────────────────────────── */
        .tabulator { background: var(--bg-primary); border: 1px solid var(--border); border-radius: 8px; font-size: 0.85rem; }
        .tabulator .tabulator-header { background: var(--bg-secondary); border-bottom: 2px solid var(--border); }
        .tabulator .tabulator-col { background: var(--bg-secondary); border-right: 1px solid var(--bg-tertiary); }
        .tabulator .tabulator-col-title { color: var(--text-muted); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.4px; }
        .tabulator .tabulator-col.tabulator-sortable .tabulator-col-title { padding-right: 18px; }
        .tabulator-row { border-bottom: 1px solid var(--bg-tertiary) !important; }
        .tabulator-row:hover { background: var(--bg-secondary) !important; }
        .tabulator-row.rec-row { background: var(--green-bg) !important; border-left: 3px solid var(--green) !important; }
        .tabulator-row.rec-row:hover { background: #133d22 !important; }
        .tabulator-row .tabulator-cell { color: var(--text-secondary); padding: 8px 10px; border-right: none !important; }
        .tabulator .tabulator-footer { background: var(--bg-secondary); border-top: 1px solid var(--border); color: var(--text-muted); }
        .tabulator .tabulator-footer .tabulator-page { color: var(--text-secondary); background: var(--bg-tertiary); border: 1px solid var(--border); }
        .tabulator .tabulator-footer .tabulator-page.active { background: #1f6feb; color: #fff; border-color: #1f6feb; }

        /* ── Custom Cell Styles ───────────────────────────────── */
        .ev-pos { color: var(--green); font-weight: 600; }
        .ev-mid { color: var(--amber); }
        .ev-neg { color: var(--red); }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.68rem; font-weight: 600; text-transform: uppercase; }
        .b-rec { background: #238636; color: #fff; }
        .b-fg { background: #1f6feb22; color: var(--accent); border: 1px solid #1f6feb; }
        .b-f5 { background: #a371f722; color: var(--purple); border: 1px solid #a371f7; }
        .stars { color: var(--amber); letter-spacing: 1px; font-size: 0.8rem; }

        /* ── Loading Overlay ──────────────────────────────────── */
        .overlay {
            position: fixed; inset: 0; background: #0d1117ee;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000;
        }
        .big-spin { width: 48px; height: 48px; border: 4px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px; }
        .overlay p { color: var(--text-muted); font-size: 1rem; }

        /* ── Toast ────────────────────────────────────────────── */
        .toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: var(--bg-tertiary); color: var(--text-secondary);
            padding: 12px 24px; border-radius: 8px; border: 1px solid var(--border);
            z-index: 1001; font-size: 0.88rem; opacity: 0; transition: opacity 0.3s;
            max-width: 90vw; text-align: center;
        }
        .toast.show { opacity: 1; }
        .toast.error { border-color: var(--red); }
        .toast.success { border-color: var(--green); }

        /* ── Empty State ─────────────────────────────────────── */
        .empty {
            text-align: center; padding: 60px 20px; color: var(--text-muted);
        }
        .empty h2 { font-size: 1.3rem; color: var(--text-secondary); margin-bottom: 8px; }
        .empty p { margin-bottom: 20px; }

        /* ── Mobile ───────────────────────────────────────────── */
        @media (max-width: 768px) {
            .header h1 { font-size: 1.15rem; }
            .stats-bar { gap: 6px; padding: 8px 12px; }
            .stat { padding: 8px; min-width: 70px; }
            .stat .val { font-size: 1.1rem; }
            .controls { padding: 8px 12px; gap: 4px; }
            .fbtn { padding: 5px 10px; font-size: 0.78rem; }
            .act-btn { padding: 7px 12px; font-size: 0.78rem; }
            #table-wrap { padding: 0 8px 16px; }
        }
        @media (max-width: 480px) {
            .controls { flex-wrap: wrap; }
            .act-btn { margin-left: 0; flex: 1; text-align: center; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>⚾ GBSV MLB Slate</h1>
    <div class="sub" id="hdr-sub">Loading...</div>
</div>

<div class="stats-bar">
    <div class="stat"><div class="val" id="s-games">—</div><div class="lbl">Games</div></div>
    <div class="stat"><div class="val" id="s-picks">—</div><div class="lbl">Total Picks</div></div>
    <div class="stat green"><div class="val" id="s-recs">—</div><div class="lbl">Recommended</div></div>
    <div class="stat"><div class="val" id="s-ev">—</div><div class="lbl">Best EV</div></div>
</div>

<div class="controls">
    <button class="fbtn active" data-f="all">All</button>
    <button class="fbtn" data-f="rec">★ Recommended</button>
    <button class="fbtn" data-f="FG">FG</button>
    <button class="fbtn" data-f="F5">F5</button>
    <button class="act-btn refresh-btn" id="btn-refresh" onclick="doRefresh()">🔄 Fetch Fresh Odds</button>
    <button class="act-btn teams-btn" id="btn-teams" onclick="postToTeams()" title="Post slate to Teams channel">📢 Post to Teams</button>
</div>

<div id="table-wrap">
    <div id="picks-table"></div>
</div>

<div class="overlay" id="overlay" style="display:none">
    <div class="big-spin"></div>
    <p id="overlay-msg">Fetching fresh odds...</p>
</div>

<div class="toast" id="toast"></div>

<script src="https://unpkg.com/tabulator-tables@6.3/dist/js/tabulator.min.js"></script>
<script>
/* ── Globals ──────────────────────────────────────────────────────── */
let table = null;
let allData = [];
const qs = new URLSearchParams(location.search);
const dateQ = qs.get('date') || '';

document.addEventListener('DOMContentLoaded', () => {
    setupFilters();
    loadSlate();
});

/* ── Filters ─────────────────────────────────────────────────────── */
function setupFilters() {
    document.querySelectorAll('.fbtn').forEach(b => {
        b.addEventListener('click', () => {
            document.querySelectorAll('.fbtn').forEach(x => x.classList.remove('active'));
            b.classList.add('active');
            applyFilter(b.dataset.f);
        });
    });
}
function applyFilter(f) {
    if (!table) return;
    table.clearFilter();
    if (f === 'rec') table.setFilter(d => d.is_recommended === 'True' || d.is_recommended === true);
    else if (f === 'FG' || f === 'F5') table.setFilter('segment', '=', f);
}

/* ── Data Loading ────────────────────────────────────────────────── */
async function loadSlate() {
    const url = '/api/slate' + (dateQ ? '?date=' + dateQ : '');
    try {
        const r = await fetch(url);
        const d = await r.json();
        if (d.status === 'ok' && d.picks && d.picks.length > 0) { render(d); return; }
    } catch {}
    // No cached data — show empty state
    showEmpty();
}

async function doRefresh() {
    const btn = document.getElementById('btn-refresh');
    const ov = document.getElementById('overlay');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Fetching...';
    ov.style.display = 'flex';
    document.getElementById('overlay-msg').textContent = 'Fetching fresh odds & running models...';

    const url = '/api/slate?refresh=true' + (dateQ ? '&date=' + dateQ : '');
    try {
        const r = await fetch(url);
        const d = await r.json();
        if (d.status === 'ok') { render(d); toast('Odds refreshed ✓', 'success'); }
        else { toast(d.message || 'Error fetching odds', 'error'); }
    } catch (e) { toast('Network error: ' + e.message, 'error'); }
    finally { btn.disabled = false; btn.innerHTML = '🔄 Fetch Fresh Odds'; ov.style.display = 'none'; }
}

async function postToTeams() {
    const btn = document.getElementById('btn-teams');
    btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>Posting...';
    const url = '/api/slate/teams' + (dateQ ? '?date=' + dateQ : '');
    try {
        const r = await fetch(url, { method: 'POST' });
        const d = await r.json();
        if (d.status === 'ok') toast('Posted to Teams ✓', 'success');
        else toast(d.message || 'Teams post failed', 'error');
    } catch (e) { toast('Network error: ' + e.message, 'error'); }
    finally { btn.disabled = false; btn.innerHTML = '📢 Post to Teams'; }
}

/* ── Render ───────────────────────────────────────────────────────── */
function showEmpty() {
    document.getElementById('table-wrap').innerHTML =
        '<div class="empty"><h2>No picks loaded</h2><p>Tap "Fetch Fresh Odds" to generate today\'s slate.</p></div>';
}

function render(data) {
    allData = data.picks || [];
    const games = new Set(allData.map(p => p.game)).size;
    const recs = allData.filter(p => p.is_recommended === 'True' || p.is_recommended === true).length;
    const evs = allData.map(p => parseFloat(p.no_vig_ev) || 0);
    const topEv = evs.length ? Math.max(...evs) : 0;

    document.getElementById('hdr-sub').textContent =
        data.date + '  ·  ' + data.total_picks + ' picks  ·  Updated ' + new Date().toLocaleTimeString();
    document.getElementById('s-games').textContent = games;
    document.getElementById('s-picks').textContent = data.total_picks;
    document.getElementById('s-recs').textContent = recs;
    document.getElementById('s-ev').textContent = (topEv > 0 ? '+' : '') + (topEv * 100).toFixed(1) + '%';

    // Ensure table-wrap has the div
    document.getElementById('table-wrap').innerHTML = '<div id="picks-table"></div>';
    buildTable(allData);
}

/* ── Table ────────────────────────────────────────────────────────── */
function fmtEv(cell) {
    const v = parseFloat(cell.getValue());
    const s = (v * 100).toFixed(1) + '%';
    if (v > 0.03) return '<span class="ev-pos">+' + s + '</span>';
    if (v > 0)    return '<span class="ev-mid">+' + s + '</span>';
    return '<span class="ev-neg">' + s + '</span>';
}
function fmtPct(cell) { return (parseFloat(cell.getValue()) * 100).toFixed(1) + '%'; }
function fmtOdds(cell) { const v = parseInt(cell.getValue()); return v > 0 ? '+'+v : ''+v; }
function fmtSeg(cell) {
    const v = cell.getValue();
    return v === 'FG' ? '<span class="badge b-fg">FG</span>' : '<span class="badge b-f5">F5</span>';
}
function fmtStars(cell) {
    const c = parseFloat(cell.getRow().getData().confidence) || 0;
    const n = Math.round(c * 5);
    return '<span class="stars">' + '★'.repeat(n) + '☆'.repeat(5 - n) + '</span>';
}
function fmtRec(cell) {
    const v = cell.getValue();
    return (v === 'True' || v === true) ? '<span class="badge b-rec">✓ REC</span>' : '';
}
function rowFmt(row) {
    const d = row.getData();
    if (d.is_recommended === 'True' || d.is_recommended === true)
        row.getElement().classList.add('rec-row');
}

function buildTable(data) {
    if (table) { table.destroy(); table = null; }
    table = new Tabulator('#picks-table', {
        data: data,
        layout: 'fitDataStretch',
        responsiveLayout: 'collapse',
        pagination: data.length > 50,
        paginationSize: 50,
        rowFormatter: rowFmt,
        initialSort: [{ column: 'no_vig_ev', dir: 'desc' }],
        columns: [
            { title: '', formatter: 'responsiveCollapse', width: 30, minWidth: 30, hozAlign: 'center', resizable: false, headerSort: false, responsive: 0 },
            { title: 'Rec', field: 'is_recommended', formatter: fmtRec, width: 65, hozAlign: 'center', responsive: 0,
              sorter: (a,b)=>((a==='True'||a===true)?1:0)-((b==='True'||b===true)?1:0) },
            { title: 'Game', field: 'game', minWidth: 150, responsive: 0, headerFilter: 'input', headerFilterPlaceholder: 'search...' },
            { title: 'Seg', field: 'segment', formatter: fmtSeg, width: 55, hozAlign: 'center', responsive: 0 },
            { title: 'Market', field: 'market_type', width: 85, responsive: 2 },
            { title: 'Pick', field: 'pick', minWidth: 140, responsive: 0 },
            { title: 'Odds', field: 'odds_current', formatter: fmtOdds, width: 65, hozAlign: 'right', sorter: 'number', responsive: 0 },
            { title: 'Model', field: 'model_prob', formatter: fmtPct, width: 70, hozAlign: 'right', sorter: 'number', responsive: 3 },
            { title: 'Implied', field: 'implied_prob', formatter: fmtPct, width: 70, hozAlign: 'right', sorter: 'number', responsive: 4 },
            { title: 'Edge', field: 'no_vig_ev', formatter: fmtEv, width: 75, hozAlign: 'right', sorter: 'number', responsive: 0 },
            { title: 'Kelly', field: 'kelly', formatter: fmtPct, width: 65, hozAlign: 'right', sorter: 'number', responsive: 3 },
            { title: 'Conf', field: 'confidence', width: 55, hozAlign: 'right', sorter: 'number', responsive: 4,
              formatter: c => parseFloat(c.getValue()).toFixed(2) },
            { title: 'Rating', field: 'confidence', formatter: fmtStars, width: 100, hozAlign: 'center', responsive: 2, headerSort: false },
            { title: 'Quality', field: 'odds_quality', width: 65, hozAlign: 'center', responsive: 5 },
        ],
    });
}

/* ── Toast ────────────────────────────────────────────────────────── */
function toast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show ' + (type || '');
    setTimeout(() => t.className = 'toast', 3500);
}
</script>
</body>
</html>
